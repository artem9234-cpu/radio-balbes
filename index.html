<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Радио Балбес</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .container { width: 100%; max-width: 400px; text-align: center; }
        h1 { font-size: 28px; margin-bottom: 10px; }
        .disc {
            width: 200px; height: 200px; margin: 30px auto;
            background: conic-gradient(#667eea, #764ba2, #f093fb, #667eea);
            border-radius: 50%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            display: flex; align-items: center; justify-content: center;
        }
        .disc.spinning { animation: spin 2s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .track-info {
            font-size: 20px; font-weight: 600; margin-bottom: 10px;
            min-height: 50px; padding: 0 10px; line-height: 1.4;
        }
        .artist-info {
            font-size: 16px; color: rgba(255,255,255,0.8);
            margin-bottom: 30px; min-height: 25px;
        }
        .play-btn {
            padding: 15px 50px; background: #fff; color: #667eea;
            border: none; border-radius: 50px; font-size: 18px;
            font-weight: bold; cursor: pointer; margin-top: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }
        .play-btn:active { transform: scale(0.95); }
        .status {
            margin-top: 15px; padding: 10px;
            background: rgba(0,0,0,0.3); border-radius: 10px;
            font-size: 14px; min-height: 40px;
        }
        .status.error { background: rgba(255,0,0,0.3); border: 1px solid rgba(255,0,0,0.5); }
        .status.success { background: rgba(0,255,0,0.3); border: 1px solid rgba(0,255,0,0.5); }
    </style>
</head>
<body>
    <div class="container">
        <h1>📻 Радио Балбес</h1>
        <div class="disc" id="disc"><div style="width:60px;height:60px;background:rgba(0,0,0,0.3);border-radius:50%"></div></div>
        
        <div class="track-info" id="track-name">Нажмите "Включить"</div>
        <div class="artist-info" id="artist-name">для начала прослушивания</div>
        
        <button class="play-btn" id="playBtn" onclick="togglePlay()">▶ Включить</button>
        <div class="status" id="status">Готово к работе</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        let audio = null;
        let isPlaying = false;
        let streamIndex = 0;
        
        // Рабочие URL потоков (MP3 для совместимости)
        const streamUrls = [
            'https://rr-record-ice.castplus.ru/bighits',
            'https://radiorecord.hostingradio.ru/bighits96.mp3',
            'https://stream.radiorecord.ru:9001/bighits',
            'https://rr-record.icecast.ru/bighits.mp3'
        ];
        
        function setStatus(message, type = '') {
            const statusEl = document.getElementById('status');
            statusEl.textContent = message;
            statusEl.className = 'status ' + type;
            console.log('[Radio] ' + message);
        }
        
        async function togglePlay() {
            const btn = document.getElementById('playBtn');
            const disc = document.getElementById('disc');
            
            if (isPlaying) {
                // Остановка
                if (audio) {
                    audio.pause();
                    audio = null;
                }
                isPlaying = false;
                btn.textContent = '▶ Включить';
                disc.classList.remove('spinning');
                setStatus('⏸ Остановлено', '');
                document.getElementById('track-name').textContent = 'Нажмите "Включить"';
                document.getElementById('artist-name').textContent = 'для начала прослушивания';
            } else {
                // Запуск — пробуем потоки по очереди
                streamIndex = 0;
                await tryPlayStream();
            }
        }
        
        async function tryPlayStream() {
            if (streamIndex >= streamUrls.length) {
                setStatus('❌ Ни один поток не доступен', 'error');
                document.getElementById('playBtn').textContent = '▶ Включить';
                return;
            }
            
            const currentUrl = streamUrls[streamIndex];
            setStatus(`🔄 Подключение (источник ${streamIndex + 1})...`, '');
            
            try {
                audio = new Audio();
                audio.crossOrigin = "anonymous";
                audio.preload = "auto";
                audio.src = currentUrl;
                
                // Таймаут 8 секунд
                const timeout = new Promise((_, reject) => {
                    setTimeout(() => reject(new Error('Превышено время')), 8000);
                });
                
                // Пробуем воспроизвести
                const playPromise = audio.play();
                await Promise.race([playPromise, timeout]);
                
                // Успех!
                isPlaying = true;
                document.getElementById('playBtn').textContent = '⏸ Пауза';
                document.getElementById('disc').classList.add('spinning');
                setStatus('🔊 Играет Record Big Hits', 'success');
                document.getElementById('track-name').textContent = 'Играет Radio Record';
                document.getElementById('artist-name').textContent = 'Big Hits';
                
                // Обновление информации о треке
                updateTrackInfo();
                setInterval(updateTrackInfo, 15000);
                
            } catch (error) {
                console.log(`Поток ${streamIndex + 1} не сработал:`, error.message);
                streamIndex++;
                setStatus(`❌ Ошибка, пробуем следующий...`, 'error');
                setTimeout(() => tryPlayStream(), 500);
            }
        }
        
        // Обновление информации о треке
        async function updateTrackInfo() {
            if (!isPlaying) return;
            
            try {
                const response = await fetch('https://radiorecord.ru/api/station/history/?id=bighits', {
                    method: 'GET',
                    headers: { 'Accept': 'application/json' }
                });
                
                if (!response.ok) throw new Error('API error');
                
                const data = await response.json();
                
                if (data && data.items && data.items.length > 0) {
                    const currentTrack = data.items[0];
                    const parts = currentTrack.name.split(' - ');
                    
                    if (parts.length > 1) {
                        document.getElementById('artist-name').textContent = parts[0].trim();
                        document.getElementById('track-name').textContent = parts.slice(1).join(' - ').trim();
                    } else {
                        document.getElementById('track-name').textContent = currentTrack.name.trim();
                        document.getElementById('artist-name').textContent = 'Radio Record';
                    }
                }
            } catch (error) {
                console.log('[Radio] Track info error:', error);
            }
        }
        
        // Инициализация
        setStatus('✅ Готово к работе', 'success');
        console.log('[Radio] App initialized');
    </script>
</body>
</html>
