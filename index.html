<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Радио Балбес</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h1 { font-size: 28px; margin-bottom: 10px; }
        .disc {
            width: 200px;
            height: 200px;
            margin: 30px auto;
            background: conic-gradient(#667eea, #764ba2, #f093fb, #667eea);
            border-radius: 50%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .disc.spinning { animation: spin 2s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .station-list {
            margin: 20px 0;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 15px;
        }
        .station-btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 5px 0;
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .station-btn:hover { background: rgba(255,255,255,0.3); }
        .station-btn.active { background: #fff; color: #667eea; }
        .play-btn {
            padding: 15px 50px;
            background: #fff;
            color: #667eea;
            border: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }
        .status {
            margin-top: 15px;
            padding: 10px;
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📻 Радио Балбес</h1>
        <div class="disc" id="disc"><div style="width:60px;height:60px;background:rgba(0,0,0,0.3);border-radius:50%"></div></div>
        
        <div class="station-list">
            <button class="station-btn" onclick="selectStation('record')">🎵 Record Big Hits</button>
            <button class="station-btn" onclick="selectStation('record-deep')">🎧 Record Deep</button>
            <button class="station-btn" onclick="selectStation('europa')">🎶 Europa Plus</button>
            <button class="station-btn" onclick="selectStation('dfm')">🔥 DFM</button>
            <button class="station-btn" onclick="selectStation('energy')">⚡ Energy</button>
        </div>
        
        <button class="play-btn" id="playBtn" onclick="togglePlay()">▶ Включить</button>
        <div class="status" id="status">Выберите станцию</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        const audio = new Audio();
        audio.crossOrigin = "anonymous";
        
        const stations = {
            'record': 'https://rr-record-ice.castplus.ru/bighits',
            'record-deep': 'https://radiorecord.hostingradio.ru/deep96',
            'europa': 'https://ep256.hostingradio.ru:8042/ep256',
            'dfm': 'https://dfm.hostingradio.ru/dfm96',
            'energy': 'https://energy.hostingradio.ru/energy96'
        };
        
        let currentStation = null;
        let isPlaying = false;
        
        function selectStation(station) {
            currentStation = station;
            document.querySelectorAll('.station-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('status').textContent = 'Выбрана: ' + event.target.textContent;
            if (isPlaying) togglePlay();
        }
        
        function togglePlay() {
            if (!currentStation) {
                document.getElementById('status').textContent = '❌ Выберите станцию!';
                return;
            }
            
            const btn = document.getElementById('playBtn');
            const disc = document.getElementById('disc');
            
            if (isPlaying) {
                audio.pause();
                btn.textContent = '▶ Включить';
                disc.classList.remove('spinning');
                isPlaying = false;
                document.getElementById('status').textContent = '⏸ Остановлено';
            } else {
                if (!audio.src) audio.src = stations[currentStation];
                
                audio.play().then(() => {
                    btn.textContent = '⏸ Пауза';
                    disc.classList.add('spinning');
                    isPlaying = true;
                    document.getElementById('status').textContent = '🔊 Играет';
                }).catch(err => {
                    document.getElementById('status').textContent = '❌ Ошибка: ' + err.message;
                });
            }
        }
    </script>
</body>
</html>
