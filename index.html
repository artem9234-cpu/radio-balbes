<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Радио Балбес</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .container { width: 100%; max-width: 400px; text-align: center; }
        h1 { font-size: 28px; margin-bottom: 10px; }
        .disc {
            width: 200px; height: 200px; margin: 30px auto;
            background: conic-gradient(#667eea, #764ba2, #f093fb, #667eea);
            border-radius: 50%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            display: flex; align-items: center; justify-content: center;
        }
        .disc.spinning { animation: spin 2s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .track-info {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 10px;
            min-height: 50px;
            padding: 0 10px;
            line-height: 1.4;
        }
        .artist-info {
            font-size: 16px;
            color: rgba(255,255,255,0.8);
            margin-bottom: 30px;
            min-height: 25px;
        }
        .play-btn {
            padding: 15px 50px;
            background: #fff;
            color: #667eea;
            border: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }
        .play-btn:active { transform: scale(0.95); }
        .status {
            margin-top: 15px;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            font-size: 14px;
            min-height: 40px;
        }
        .status.error { background: rgba(255,0,0,0.3); border: 1px solid rgba(255,0,0,0.5); }
        .status.success { background: rgba(0,255,0,0.3); border: 1px solid rgba(0,255,0,0.5); }
    </style>
</head>
<body>
    <div class="container">
        <h1>📻 Радио Балбес</h1>
        <div class="disc" id="disc"><div style="width:60px;height:60px;background:rgba(0,0,0,0.3);border-radius:50%"></div></div>
        
        <div class="track-info" id="track-name">Нажмите "Включить"</div>
        <div class="artist-info" id="artist-name">для начала прослушивания</div>
        
        <button class="play-btn" id="playBtn" onclick="togglePlay()">▶ Включить</button>
        <div class="status" id="status">Готово к работе</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        let audio = null;
        let isPlaying = false;
        
        // Только Record Big Hits (основной + backup)
        const streamUrl = 'https://radiorecord.hostingradio.ru/bighits96.aacp';
        const backupUrl = 'https://rr-record-ice.castplus.ru/bighits';
        
        function setStatus(message, type = '') {
            const statusEl = document.getElementById('status');
            statusEl.textContent = message;
            statusEl.className = 'status ' + type;
            console.log('[Radio] ' + message);
        }
        
        function stopPlayback() {
            if (audio) {
                audio.pause();
                audio = null;
            }
            isPlaying = false;
            document.getElementById('playBtn').textContent = '▶ Включить';
            document.getElementById('disc').classList.remove('spinning');
        }
        
        async function togglePlay() {
            const btn = document.getElementById('playBtn');
            const disc = document.getElementById('disc');
            
            if (isPlaying) {
                stopPlayback();
                setStatus('⏸ Остановлено', '');
                document.getElementById('track-name').textContent = 'Нажмите "Включить"';
                document.getElementById('artist-name').textContent = 'для начала прослушивания';
                return;
            }
            
            // Создаем новый аудио элемент
            audio = new Audio();
            audio.crossOrigin = "anonymous";
            audio.preload = "auto";
            
            let streamUrlToUse = streamUrl;
            let usingBackup = false;
            
            setStatus('🔄 Подключение...', '');
            btn.textContent = '⏳ Загрузка...';
            btn.disabled = true;
            
            // Пробуем основной поток
            try {
                await tryPlayStream(streamUrlToUse);
            } catch (error) {
                console.log('Основной поток не сработал, пробуем backup...');
                usingBackup = true;
                streamUrlToUse = backupUrl;
                try {
                    await tryPlayStream(streamUrlToUse);
                } catch (error2) {
                    setStatus('❌ Ошибка: поток недоступен', 'error');
                    btn.textContent = '▶ Включить';
                    btn.disabled = false;
                    return;
                }
            }
            
            // Если дошли сюда - всё работает
            isPlaying = true;
            btn.textContent = '⏸ Пауза';
            disc.classList.add('spinning');
            setStatus(usingBackup ? '🔊 Играет (backup)' : '🔊 Играет', 'success');
            document.getElementById('track-name').textContent = 'Играет Radio Record';
            document.getElementById('artist-name').textContent = 'Big Hits';
            btn.disabled = false;
        }
        
        function tryPlayStream(url) {
            return new Promise((resolve, reject) => {
                if (!audio) {
                    audio = new Audio();
                    audio.crossOrigin = "anonymous";
                }
                
                audio.src = url;
                
                const timeout = setTimeout(() => {
                    reject(new Error('Превышено время подключения'));
                }, 10000);
                
                audio.addEventListener('canplay', () => {
                    clearTimeout(timeout);
                    audio.play().then(() => {
                        resolve();
                    }).catch(err => {
                        clearTimeout(timeout);
                        reject(err);
                    });
                }, { once: true });
                
                audio.addEventListener('error', (e) => {
                    clearTimeout(timeout);
                    reject(new Error('Ошибка потока'));
                }, { once: true });
                
                audio.load();
            });
        }
        
        // Обработка ошибок
        if (audio) {
            audio.addEventListener('error', (e) => {
                console.error('Audio error:', e);
                setStatus('⚠️ Ошибка потока', 'error');
            });
        }
        
        // Инициализация
        setStatus('✅ Готово к работе', 'success');
        console.log('[Radio] App initialized');
    </script>
</body>
</html>
