<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Радио Балбес</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .container { width: 100%; max-width: 400px; text-align: center; }
        h1 { font-size: 28px; margin-bottom: 10px; }
        
        /* Виниловая пластинка */
        .disc {
            width: 220px;
            height: 220px;
            margin: 30px auto;
            position: relative;
            border-radius: 50%;
            box-shadow: 
                0 10px 40px rgba(0,0,0,0.5),
                inset 0 0 0 2px rgba(255,255,255,0.1);
        }
        
        .disc.spinning {
            animation: spin 2s linear infinite;
        }
        
        .vinyl {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: 
                repeating-radial-gradient(
                    circle at center,
                    #1a1a1a 0px,
                    #2a2a2a 2px,
                    #1a1a1a 4px,
                    #2a2a2a 6px,
                    #1a1a1a 8px,
                    #2a2a2a 10px,
                    #1a1a1a 12px,
                    #2a2a2a 14px,
                    #1a1a1a 16px,
                    #2a2a2a 18px,
                    #1a1a1a 20px,
                    #2a2a2a 22px,
                    #1a1a1a 24px,
                    #2a2a2a 26px,
                    #1a1a1a 28px,
                    #2a2a2a 30px,
                    #1a1a1a 32px,
                    #2a2a2a 34px,
                    #1a1a1a 36px,
                    #2a2a2a 38px,
                    #1a1a1a 40px,
                    #2a2a2a 42px,
                    #1a1a1a 44px,
                    #2a2a2a 46px,
                    #1a1a1a 48px,
                    #2a2a2a 50px,
                    #1a1a1a 52px,
                    #2a2a2a 54px,
                    #1a1a1a 56px,
                    #2a2a2a 58px,
                    #1a1a1a 60px,
                    #2a2a2a 62px,
                    #1a1a1a 64px,
                    #2a2a2a 66px,
                    #1a1a1a 68px,
                    #2a2a2a 70px,
                    #1a1a1a 72px,
                    #2a2a2a 74px,
                    #1a1a1a 76px,
                    #2a2a2a 78px,
                    #1a1a1a 80px,
                    #2a2a2a 82px,
                    #1a1a1a 84px,
                    #2a2a2a 86px,
                    #1a1a1a 88px,
                    #2a2a2a 90px,
                    #1a1a1a 92px,
                    #2a2a2a 94px,
                    #1a1a1a 96px,
                    #2a2a2a 98px,
                    #1a1a1a 100px
                ),
                radial-gradient(circle at center, #2a2a2a 0%, #1a1a1a 100%);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }
        
        /* Текст БАЛБЕСЫ по кругу */
        .vinyl-text {
            position: absolute;
            width: 100%;
            height: 100%;
            animation: inherit;
        }
        
        .vinyl-text svg {
            width: 100%;
            height: 100%;
        }
        
        .vinyl-text text {
            fill: rgba(255, 255, 255, 0.9);
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 3px;
            text-transform: uppercase;
        }
        
        /* Центральная этикетка с картинкой */
        .vinyl-label {
            position: absolute;
            width: 90px;
            height: 90px;
            border-radius: 50%;
            overflow: hidden;
            z-index: 10;
            box-shadow: 
                0 0 0 8px #1a1a1a,
                0 0 0 10px #2a2a2a,
                0 5px 15px rgba(0,0,0,0.5);
            background: #fff;
        }
        
        .vinyl-label img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        /* Центральное отверстие */
        .vinyl-hole {
            position: absolute;
            width: 15px;
            height: 15px;
            background: #0a0a0a;
            border-radius: 50%;
            z-index: 11;
            box-shadow: inset 0 0 5px rgba(0,0,0,0.8);
        }
        
        @keyframes spin {
            100% { transform: rotate(360deg); }
        }
        
        .track-info {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 10px;
            min-height: 50px;
            padding: 0 10px;
            line-height: 1.4;
        }
        .artist-info {
            font-size: 16px;
            color: rgba(255,255,255,0.8);
            margin-bottom: 30px;
            min-height: 25px;
        }
        .play-btn {
            padding: 15px 50px;
            background: #fff;
            color: #667eea;
            border: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }
        .play-btn:active { transform: scale(0.95); }
        .status {
            margin-top: 15px;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            font-size: 14px;
            min-height: 40px;
        }
        .status.error { background: rgba(255,0,0,0.3); border: 1px solid rgba(255,0,0,0.5); }
        .status.success { background: rgba(0,255,0,0.3); border: 1px solid rgba(0,255,0,0.5); }
    </style>
</head>
<body>
    <div class="container">
        <h1>📻 Радио Балбес</h1>
        
        <div class="disc" id="disc">
            <div class="vinyl">
                <!-- Текст БАЛБЕСЫ по кругу -->
                <div class="vinyl-text">
                    <svg viewBox="0 0 220 220">
                        <defs>
                            <path id="circlePath" d="
                                M 110, 40
                                A 70,70 0 1,1 109.9,40
                                Z
                            " />
                        </defs>
                        <text>
                            <textPath href="#circlePath">
                                БАЛБЕСЫ • БАЛБЕСЫ • БАЛБЕСЫ • 
                            </textPath>
                        </text>
                    </svg>
                </div>
                
                <!-- Центральная этикетка с картинкой -->
                <div class="vinyl-label">
                    <!-- ЗАМЕНИ src НА ССЫЛКУ НА ТВОЮ КАРТИНКУ -->
                    <img src="label.png" alt="Label">
                </div>
                
                <!-- Центральное отверстие -->
                <div class="vinyl-hole"></div>
            </div>
        </div>
        
        <div class="track-info" id="track-name">Нажмите "Включить"</div>
        <div class="artist-info" id="artist-name">для начала прослушивания</div>
        
        <button class="play-btn" id="playBtn" onclick="togglePlay()">▶ Включить</button>
        <div class="status" id="status">Готово к работе</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        let audio = null;
        let isPlaying = false;
        
        // Только Record Big Hits (основной + backup)
        const streamUrl = 'https://radiorecord.hostingradio.ru/bighits96.aacp';
        const backupUrl = 'https://rr-record-ice.castplus.ru/bighits';
        
        function setStatus(message, type = '') {
            const statusEl = document.getElementById('status');
            statusEl.textContent = message;
            statusEl.className = 'status ' + type;
            console.log('[Radio] ' + message);
        }
        
        function stopPlayback() {
            if (audio) {
                audio.pause();
                audio = null;
            }
            isPlaying = false;
            document.getElementById('playBtn').textContent = '▶ Включить';
            document.getElementById('disc').classList.remove('spinning');
        }
        
        async function togglePlay() {
            const btn = document.getElementById('playBtn');
            const disc = document.getElementById('disc');
            
            if (isPlaying) {
                stopPlayback();
                setStatus('⏸ Остановлено', '');
                document.getElementById('track-name').textContent = 'Нажмите "Включить"';
                document.getElementById('artist-name').textContent = 'для начала прослушивания';
                return;
            }
            
            // Создаем новый аудио элемент
            audio = new Audio();
            audio.crossOrigin = "anonymous";
            audio.preload = "auto";
            
            let streamUrlToUse = streamUrl;
            let usingBackup = false;
            
            setStatus('🔄 Подключение...', '');
            btn.textContent = '⏳ Загрузка...';
            btn.disabled = true;
            
            // Пробуем основной поток
            try {
                await tryPlayStream(streamUrlToUse);
            } catch (error) {
                console.log('Основной поток не сработал, пробуем backup...');
                usingBackup = true;
                streamUrlToUse = backupUrl;
                try {
                    await tryPlayStream(streamUrlToUse);
                } catch (error2) {
                    setStatus('❌ Ошибка: поток недоступен', 'error');
                    btn.textContent = '▶ Включить';
                    btn.disabled = false;
                    return;
                }
            }
            
            // Если дошли сюда - всё работает
            isPlaying = true;
            btn.textContent = '⏸ Пауза';
            disc.classList.add('spinning');
            setStatus(usingBackup ? '🔊 Играет (backup)' : '🔊 Играет', 'success');
            document.getElementById('track-name').textContent = 'Играет Radio Record';
            document.getElementById('artist-name').textContent = 'Big Hits';
            btn.disabled = false;
        }
        
        function tryPlayStream(url) {
            return new Promise((resolve, reject) => {
                if (!audio) {
                    audio = new Audio();
                    audio.crossOrigin = "anonymous";
                }
                
                audio.src = url;
                
                const timeout = setTimeout(() => {
                    reject(new Error('Превышено время подключения'));
                }, 10000);
                
                audio.addEventListener('canplay', () => {
                    clearTimeout(timeout);
                    audio.play().then(() => {
                        resolve();
                    }).catch(err => {
                        clearTimeout(timeout);
                        reject(err);
                    });
                }, { once: true });
                
                audio.addEventListener('error', (e) => {
                    clearTimeout(timeout);
                    reject(new Error('Ошибка потока'));
                }, { once: true });
                
                audio.load();
            });
        }
        
        // Обработка ошибок
        if (audio) {
            audio.addEventListener('error', (e) => {
                console.error('Audio error:', e);
                setStatus('⚠️ Ошибка потока', 'error');
            });
        }
        
        // Инициализация
        setStatus('✅ Готово к работе', 'success');
        console.log('[Radio] App initialized');
    </script>
</body>
</html>
