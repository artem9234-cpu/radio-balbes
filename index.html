<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Радио Балбес</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            overflow: hidden;
        }
        .container {
            text-align: center;
            width: 100%;
            max-width: 400px;
        }
        h1 {
            font-size: 28px;
            margin-bottom: 8px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }
        .status {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 30px;
            color: #e0e0e0;
        }
        .disc {
            width: 220px;
            height: 220px;
            margin: 0 auto 30px;
            position: relative;
        }
        .disc-inner {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(from 0deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #764ba2 75%, #667eea 100%);
            box-shadow: 0 10px 40px rgba(0,0,0,0.4), inset 0 0 20px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            border: 8px solid rgba(255,255,255,0.1);
        }
        .disc.spinning .disc-inner {
            animation: spin 2s linear infinite;
        }
        .disc-center {
            width: 70px;
            height: 70px;
            background: rgba(0,0,0,0.6);
            border-radius: 50%;
            border: 4px solid rgba(255,255,255,0.2);
            position: absolute;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .track-info {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 10px;
            min-height: 50px;
            padding: 0 10px;
            line-height: 1.4;
        }
        .artist-info {
            font-size: 16px;
            color: rgba(255,255,255,0.8);
            margin-bottom: 30px;
            min-height: 25px;
        }
        .btn-play {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #ffffff;
            border: none;
            border-radius: 50px;
            padding: 18px 50px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
            margin: 10px 0;
        }
        .btn-play:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.6);
        }
        .btn-play:active {
            transform: translateY(0);
        }
        .btn-play.playing {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            box-shadow: 0 5px 20px rgba(245, 87, 108, 0.4);
        }
        .status-bar {
            margin-top: 20px;
            padding: 10px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            font-size: 12px;
            min-height: 40px;
        }
        .status-bar.error {
            background: rgba(255, 87, 87, 0.2);
            border: 1px solid rgba(255, 87, 87, 0.5);
        }
        .status-bar.success {
            background: rgba(87, 255, 87, 0.2);
            border: 1px solid rgba(87, 255, 87, 0.5);
        }
        .loader {
            display: none;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid #ffffff;
            border-radius: 50%;
            margin: 20px auto;
            animation: spin 1s linear infinite;
        }
        .loader.show { display: block; }
        @media (max-width: 480px) {
            .disc { width: 180px; height: 180px; }
            h1 { font-size: 24px; }
            .track-info { font-size: 18px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📻 Радио Балбес</h1>
        <div class="status">Record Big Hits • Live Stream</div>
        
        <div class="disc" id="disc">
            <div class="disc-inner">
                <div class="disc-center"></div>
            </div>
        </div>
        
        <div class="track-info" id="track-name">Нажмите "Включить"</div>
        <div class="artist-info" id="artist-name">для начала прослушивания</div>
        
        <button class="btn-play" id="playBtn" onclick="togglePlay()">▶ Включить</button>
        <div class="loader" id="loader"></div>
        
        <div class="status-bar" id="statusBar">
            Готов к работе
        </div>
    </div>

    <script>
        // Инициализация Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        // Элементы DOM
        const audio = new Audio();
        audio.crossOrigin = "anonymous";
        audio.preload = "auto";
        
        const playBtn = document.getElementById('playBtn');
        const disc = document.getElementById('disc');
        const trackNameEl = document.getElementById('track-name');
        const artistNameEl = document.getElementById('artist-name');
        const statusBar = document.getElementById('statusBar');
        const loader = document.getElementById('loader');
        
        let isPlaying = false;
        let currentStreamIndex = 0;
        
        //Multiple stream URLs for fallback
        const streamUrls = [
            'https://radiorecord.hostingradio.ru/bighits96',
            'https://radiorecord.hostingradio.ru/bighits',
            'https://rr-record-ice.castplus.ru/bighits',
            'https://stream.radiorecord.ru:9001/bighits',
            'https://record.radiostreamer.com:8010/bighits'
        ];
        
        function setStatus(message, type = '') {
            statusBar.textContent = message;
            statusBar.className = 'status-bar ' + type;
            console.log('[Radio] ' + message);
        }
        
        function showLoader(show) {
            loader.classList.toggle('show', show);
        }
        
        async function testStream(url) {
            return new Promise((resolve) => {
                const testAudio = new Audio();
                testAudio.crossOrigin = "anonymous";
                testAudio.src = url;
                testAudio.volume = 0;
                
                const timeout = setTimeout(() => {
                    testAudio.src = '';
                    resolve(false);
                }, 5000);
                
                testAudio.addEventListener('canplay', () => {
                    clearTimeout(timeout);
                    testAudio.src = '';
                    resolve(true);
                }, { once: true });
                
                testAudio.addEventListener('error', () => {
                    clearTimeout(timeout);
                    resolve(false);
                }, { once: true });
                
                testAudio.load();
            });
        }
        
        async function findWorkingStream() {
            setStatus('🔍 Поиск рабочего потока...', '');
            
            for (let i = 0; i < streamUrls.length; i++) {
                setStatus(`📡 Проверка источника ${i + 1}/${streamUrls.length}...`, '');
                const working = await testStream(streamUrls[i]);
                if (working) {
                    setStatus(`✅ Источник ${i + 1} работает!`, 'success');
                    return i;
                }
            }
            
            setStatus('❌ Ни один источник не доступен', 'error');
            return -1;
        }
        
        async function togglePlay() {
            if (isPlaying) {
                // Остановка
                audio.pause();
                audio.src = '';
                isPlaying = false;
                playBtn.innerHTML = '▶ Включить';
                playBtn.classList.remove('playing');
                disc.classList.remove('spinning');
                setStatus('⏸ Остановлено', '');
                trackNameEl.textContent = 'Нажмите "Включить"';
                artistNameEl.textContent = 'для начала прослушивания';
            } else {
                // Запуск
                showLoader(true);
                playBtn.disabled = true;
                
                // Проверяем доступность потоков
                const workingIndex = await findWorkingStream();
                
                if (workingIndex === -1) {
                    setStatus('❌ Не удалось найти рабочий поток. Проверьте интернет.', 'error');
                    showLoader(false);
                    playBtn.disabled = false;
                    return;
                }
                
                currentStreamIndex = workingIndex;
                audio.src = streamUrls[currentStreamIndex];
                audio.volume = 1.0;
                
                setStatus('🎵 Подключение к радио...', '');
                
                try {
                    await audio.play();
                    isPlaying = true;
                    playBtn.innerHTML = '⏸ Пауза';
                    playBtn.classList.add('playing');
                    disc.classList.add('spinning');
                    setStatus('🔊 Воспроизведение...', 'success');
                    trackNameEl.textContent = 'Играет Radio Record';
                    artistNameEl.textContent = 'Big Hits';
                    
                    // Начинаем обновлять информацию о треке
                    updateTrackInfo();
                    setInterval(updateTrackInfo, 15000);
                    
                } catch (error) {
                    console.error('[Radio] Error playing:', error);
                    setStatus('❌ Ошибка: ' + error.message, 'error');
                    
                    // Пробуем следующий источник
                    if (currentStreamIndex < streamUrls.length - 1) {
                        setStatus('🔄 Пробуем следующий источник...', '');
                        setTimeout(() => togglePlay(), 2000);
                    }
                } finally {
                    showLoader(false);
                    playBtn.disabled = false;
                }
            }
        }
        
        // Обработчики событий аудио
        audio.addEventListener('waiting', () => {
            setStatus('⏳ Буферизация...', '');
        });
        
        audio.addEventListener('playing', () => {
            setStatus('🔊 Играет', 'success');
        });
        
        audio.addEventListener('error', (e) => {
            console.error('[Radio] Audio error:', e);
            const errorMsg = audio.error ? getAudioErrorMessage(audio.error.code) : 'Неизвестная ошибка';
            setStatus('❌ Ошибка потока: ' + errorMsg, 'error');
            
            // Автоматически пробуем следующий источник
            if (isPlaying && currentStreamIndex < streamUrls.length - 1) {
                setStatus('🔄 Переключение на резервный источник...', '');
                currentStreamIndex++;
                audio.src = streamUrls[currentStreamIndex];
                audio.play().catch(() => {});
            }
        });
        
        audio.addEventListener('stalled', () => {
            setStatus('⚠️ Поток приостановлен, пробуем восстановить...', 'error');
        });
        
        function getAudioErrorMessage(code) {
            const errors = {
                1: 'MEDIA_ERR_ABORTED',
                2: 'MEDIA_ERR_NETWORK',
                3: 'MEDIA_ERR_DECODE',
                4: 'MEDIA_ERR_SRC_NOT_SUPPORTED'
            };
            return errors[code] || 'Unknown error';
        }
        
        // Обновление информации о треке
        async function updateTrackInfo() {
            if (!isPlaying) return;
            
            try {
                const response = await fetch('https://radiorecord.ru/api/station/history/?id=bighits', {
                    method: 'GET',
                    headers: {
                        'Accept': 'application/json'
                    },
                    mode: 'cors'
                });
                
                if (!response.ok) throw new Error('API error');
                
                const data = await response.json();
                
                if (data && data.items && data.items.length > 0) {
                    const currentTrack = data.items[0];
                    const parts = currentTrack.name.split(' - ');
                    
                    if (parts.length > 1) {
                        artistNameEl.textContent = parts[0].trim();
                        trackNameEl.textContent = parts.slice(1).join(' - ').trim();
                    } else {
                        trackNameEl.textContent = currentTrack.name.trim();
                        artistNameEl.textContent = 'Radio Record';
                    }
                }
            } catch (error) {
                console.log('[Radio] Track info error:', error);
                // Не показываем ошибку пользователю, просто не обновляем инфо
            }
        }
        
        // Обработка невидимости страницы
        document.addEventListener('visibilitychange', () => {
            if (document.hidden && isPlaying) {
                console.log('[Radio] Page hidden, keeping audio alive');
            }
        });
        
        // Инициализация
        setStatus('✅ Готов к работе. Нажмите "Включить"', 'success');
        console.log('[Radio] App initialized');
    </script>
</body>
</html>
