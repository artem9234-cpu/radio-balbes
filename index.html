<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Радио Балбес</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            /* БЕЛЫЙ ФОН вместо градиента */
            background: #ffffff;
            color: #333;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container { 
            width: 100%; 
            max-width: 500px; 
            text-align: center; 
        }
        h1 { 
            font-size: 32px; 
            margin-bottom: 40px;
            color: #333;
            text-shadow: none;
        }
        
        /* Виниловая пластинка */
        .disc {
            width: 320px;
            height: 320px;
            margin: 0 auto 50px;
            position: relative;
            border-radius: 50%;
            box-shadow: 
                0 20px 60px rgba(0,0,0,0.4),
                inset 0 0 0 3px rgba(255,255,255,0.2);
        }
        
        .disc.spinning {
            animation: spin 2s linear infinite;
        }
        
        .vinyl {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: 
                repeating-radial-gradient(
                    circle at center,
                    #1a1a1a 0px, #2a2a2a 2px, #1a1a1a 4px,
                    #2a2a2a 6px, #1a1a1a 8px, #2a2a2a 10px,
                    #1a1a1a 12px, #2a2a2a 14px, #1a1a1a 16px,
                    #2a2a2a 18px, #1a1a1a 20px, #2a2a2a 22px,
                    #1a1a1a 24px, #2a2a2a 26px, #1a1a1a 28px,
                    #2a2a2a 30px, #1a1a1a 32px, #2a2a2a 34px,
                    #1a1a1a 36px, #2a2a2a 38px, #1a1a1a 40px,
                    #2a2a2a 42px, #1a1a1a 44px, #2a2a2a 46px,
                    #1a1a1a 48px, #2a2a2a 50px, #1a1a1a 52px,
                    #2a2a2a 54px, #1a1a1a 56px, #2a2a2a 58px,
                    #1a1a1a 60px, #2a2a2a 62px, #1a1a1a 64px,
                    #2a2a2a 66px, #1a1a1a 68px, #2a2a2a 70px,
                    #1a1a1a 72px, #2a2a2a 74px, #1a1a1a 76px,
                    #2a2a2a 78px, #1a1a1a 80px, #2a2a2a 82px,
                    #1a1a1a 84px, #2a2a2a 86px, #1a1a1a 88px,
                    #2a2a2a 90px, #1a1a1a 92px, #2a2a2a 94px,
                    #1a1a1a 96px, #2a2a2a 98px, #1a1a1a 100px,
                    #2a2a2a 102px, #1a1a1a 104px, #2a2a2a 106px,
                    #1a1a1a 108px, #2a2a2a 110px, #1a1a1a 112px,
                    #2a2a2a 114px, #1a1a1a 116px, #2a2a2a 118px,
                    #1a1a1a 120px, #2a2a2a 122px, #1a1a1a 124px,
                    #2a2a2a 126px, #1a1a1a 128px, #2a2a2a 130px,
                    #1a1a1a 132px, #2a2a2a 134px, #1a1a1a 136px,
                    #2a2a2a 138px, #1a1a1a 140px, #2a2a2a 142px,
                    #1a1a1a 144px, #2a2a2a 146px, #1a1a1a 148px,
                    #2a2a2a 150px, #1a1a1a 152px, #2a2a2a 154px,
                    #1a1a1a 156px, #2a2a2a 158px
                ),
                radial-gradient(circle at center, #2a2a2a 0%, #1a1a1a 100%);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.9);
        }
        
        /* Текст БАЛБЕСЫ по кругу */
        .vinyl-text {
            position: absolute;
            width: 100%;
            height: 100%;
        }
        
        .vinyl-text svg {
            width: 100%;
            height: 100%;
        }
        
        .vinyl-text text {
            fill: rgba(255, 255, 255, 0.9);
            font-size: 15px;
            font-weight: bold;
            letter-spacing: 4px; /* Увеличил интервал */
        }
        
        /* Центральная этикетка с картинкой */
        .vinyl-label {
            position: absolute;
            width: 130px;
            height: 130px;
            border-radius: 50%;
            overflow: hidden;
            z-index: 10;
            background: #fff;
            box-shadow: 
                0 0 0 8px #1a1a1a,
                0 0 0 11px #2a2a2a,
                0 0 0 14px #1a1a1a,
                0 10px 25px rgba(0,0,0,0.6);
        }
        
        .vinyl-label img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
        }
        
        /* Центральное отверстие */
        .vinyl-hole {
            position: absolute;
            width: 16px;
            height: 16px;
            background: #0a0a0a;
            border-radius: 50%;
            z-index: 11;
            box-shadow: inset 0 0 6px rgba(0,0,0,0.9);
        }
        
        @keyframes spin {
            100% { transform: rotate(360deg); }
        }
        
        /* Анимированная кнопка */
        .play-btn {
            padding: 20px 60px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border: none;
            border-radius: 50px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 30px;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.5);
            animation: pulse 2s ease-in-out infinite;
            transition: all 0.3s ease;
        }
        
        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                box-shadow: 0 10px 30px rgba(102, 126, 234, 0.5);
            }
            50% {
                transform: scale(1.05);
                box-shadow: 0 15px 40px rgba(102, 126, 234, 0.7);
            }
        }
        
        .play-btn:active { 
            transform: scale(0.95);
            animation: none;
        }
        
        .play-btn.playing {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            box-shadow: 0 10px 30px rgba(245, 87, 108, 0.5);
            animation: none;
        }
        
        .status {
            margin-top: 25px;
            padding: 12px 25px;
            background: rgba(0,0,0,0.1);
            border-radius: 10px;
            font-size: 14px;
            min-height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
        }
        .status.error { background: rgba(255,0,0,0.2); border: 1px solid rgba(255,0,0,0.4); }
        .status.success { background: rgba(0,255,0,0.2); border: 1px solid rgba(0,255,0,0.4); }
        
        @media (max-width: 480px) {
            .disc { width: 260px; height: 260px; }
            .vinyl-label { width: 100px; height: 100px; }
            h1 { font-size: 26px; margin-bottom: 30px; }
            .play-btn { padding: 18px 50px; font-size: 18px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📻 Радио Балбес</h1>
        
        <div class="disc" id="disc">
            <div class="vinyl">
                <!-- Текст БАЛБЕСЫ по кругу - 4 повторения с равномерным распределением -->
                <div class="vinyl-text">
                    <svg viewBox="0 0 320 320">
                        <defs>
                            <path id="circlePath" d="M 160, 55 A 105,105 0 1,1 159.9,55 Z" />
                        </defs>
                        <text>
                            <textPath href="#circlePath" startOffset="0%">
                                БАЛБЕСЫ • БАЛБЕСЫ • БАЛБЕСЫ • БАЛБЕСЫ
                            </textPath>
                        </text>
                    </svg>
                </div>
                
                <!-- Центральная этикетка с картинкой -->
                <div class="vinyl-label">
                    <img src="label.png" alt="Label">
                </div>
                
                <!-- Центральное отверстие -->
                <div class="vinyl-hole"></div>
            </div>
        </div>
        
        <button class="play-btn" id="playBtn" onclick="togglePlay()">▶ Включить</button>
        <div class="status" id="status">Готово к работе</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        let audio = null;
        let isPlaying = false;
        
        // Только Record Big Hits (основной + backup)
        const streamUrl = 'https://radiorecord.hostingradio.ru/bighits96.aacp';
        const backupUrl = 'https://rr-record-ice.castplus.ru/bighits';
        
        function setStatus(message, type = '') {
            const statusEl = document.getElementById('status');
            statusEl.textContent = message;
            statusEl.className = 'status ' + type;
            console.log('[Radio] ' + message);
        }
        
        function stopPlayback() {
            if (audio) {
                audio.pause();
                audio = null;
            }
            isPlaying = false;
            const btn = document.getElementById('playBtn');
            btn.textContent = '▶ Включить';
            btn.classList.remove('playing');
            document.getElementById('disc').classList.remove('spinning');
        }
        
        async function togglePlay() {
            const btn = document.getElementById('playBtn');
            const disc = document.getElementById('disc');
            
            if (isPlaying) {
                stopPlayback();
                setStatus('⏸ Остановлено', '');
                return;
            }
            
            audio = new Audio();
            audio.crossOrigin = "anonymous";
            audio.preload = "auto";
            
            let streamUrlToUse = streamUrl;
            let usingBackup = false;
            
            setStatus('🔄 Подключение...', '');
            btn.textContent = '⏳ Загрузка...';
            btn.disabled = true;
            
            try {
                await tryPlayStream(streamUrlToUse);
            } catch (error) {
                console.log('Основной поток не сработал, пробуем backup...');
                usingBackup = true;
                streamUrlToUse = backupUrl;
                try {
                    await tryPlayStream(streamUrlToUse);
                } catch (error2) {
                    setStatus('❌ Ошибка: поток недоступен', 'error');
                    btn.textContent = '▶ Включить';
                    btn.disabled = false;
                    return;
                }
            }
            
            isPlaying = true;
            btn.textContent = '⏸ Пауза';
            btn.classList.add('playing');
            disc.classList.add('spinning');
            setStatus(usingBackup ? '🔊 Играет (backup)' : '🔊 Играет', 'success');
            btn.disabled = false;
        }
        
        function tryPlayStream(url) {
            return new Promise((resolve, reject) => {
                if (!audio) {
                    audio = new Audio();
                    audio.crossOrigin = "anonymous";
                }
                
                audio.src = url;
                
                const timeout = setTimeout(() => {
                    reject(new Error('Превышено время подключения'));
                }, 10000);
                
                audio.addEventListener('canplay', () => {
                    clearTimeout(timeout);
                    audio.play().then(() => {
                        resolve();
                    }).catch(err => {
                        clearTimeout(timeout);
                        reject(err);
                    });
                }, { once: true });
                
                audio.addEventListener('error', (e) => {
                    clearTimeout(timeout);
                    reject(new Error('Ошибка потока'));
                }, { once: true });
                
                audio.load();
            });
        }
        
        if (audio) {
            audio.addEventListener('error', (e) => {
                console.error('Audio error:', e);
                setStatus('⚠️ Ошибка потока', 'error');
            });
        }
        
        setStatus('✅ Готово к работе', 'success');
        console.log('[Radio] App initialized');
    </script>
</body>
</html>
